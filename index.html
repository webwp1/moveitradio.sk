<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moveit Rádio | Žij hudbou 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; 
            --secondary: #06b6d4; 
            --accent: #f43f5e; 
            --bg-dark: #020617; 
            --text-main: #f8fafc;
            --glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.6);
            --glow-player: rgba(99, 102, 241, 0.2);
        }

        [data-theme="light"] {
            --bg-dark: #f1f5f9;
            --text-main: #0f172a;
            --glass: rgba(255, 255, 255, 0.8);
            --border-glass: rgba(15, 23, 42, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background 0.4s, color 0.4s; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- POZADÍ --- */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at 85% 80%, rgba(6, 182, 212, 0.15), transparent 40%);
            animation: pulseBg 15s ease-in-out infinite alternate;
        }
        @keyframes pulseBg { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; width: 100%; z-index: 1; }

        /* --- LOGO --- */
        header { text-align: center; margin-bottom: 60px; opacity: 0; animation: fadeIn 1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        h1 {
            font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; text-transform: uppercase;
            letter-spacing: -3px; line-height: 0.9; position: relative; display: inline-block;
            background: linear-gradient(to bottom, #fff 40%, var(--secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(6, 182, 212, 0.3));
        }

        .live-dot {
            height: 12px; width: 12px; background-color: var(--accent);
            border-radius: 50%; display: inline-block; vertical-align: middle;
            margin-left: 10px; box-shadow: 0 0 10px var(--accent);
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }

        .tagline { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 6px; margin-top: 15px; font-weight: 700; color: var(--accent); }

        /* --- PLAYER --- */
        .player-card {
            background: var(--glass); border: 2px solid var(--border-glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            padding: 50px 30px; border-radius: 40px; width: 100%; max-width: 550px; text-align: center;
            box-shadow: 0 40px 100px var(--card-shadow); margin-bottom: 60px; position: relative;
        }
        .player-card.playing { border-color: rgba(6, 182, 212, 0.4); box-shadow: 0 0 50px var(--glow-player), 0 40px 100px var(--card-shadow); }

        .now-playing { min-height: 110px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        #track-title { font-weight: 900; font-size: clamp(1.4rem, 5vw, 2rem); display: block; margin-bottom: 8px; color: var(--text-main); transition: opacity 0.3s; line-height: 1.2; }
        #track-artist { font-size: 0.9rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 4px; font-weight: 700; transition: opacity 0.3s; }

        .visualizer-inline { display: inline-flex; gap: 3px; height: 16px; margin-left: 10px; align-items: flex-end; }
        .vis-bar { width: 3px; background: var(--secondary); border-radius: 2px; height: 4px; }
        .playing .vis-bar { animation: barBounce 0.8s infinite alternate; }
        .playing .vis-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .vis-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes barBounce { 0% { height: 4px; } 100% { height: 16px; } }

        .play-outer { position: relative; width: 120px; height: 120px; margin: 25px auto; }
        .glow-ring {
            position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px; border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            opacity: 0; transition: 0.5s;
        }
        .playing .glow-ring { opacity: 0.5; animation: spinOrbit 4s linear infinite; filter: blur(10px); }
        @keyframes spinOrbit { 100% { transform: rotate(360deg); } }

        #playBtn {
            width: 100%; height: 100%; border-radius: 50%; border: none;
            background: var(--text-main); color: var(--bg-dark);
            font-size: 2.5rem; cursor: pointer; position: relative; z-index: 10;
        }
        .playing #playBtn { background: var(--accent); color: #fff; }

        .vol-wrap { display: flex; align-items: center; gap: 12px; width: 200px; margin: 10px auto 0; opacity: 0.5; }
        .vol-wrap:hover { opacity: 1; }
        input[type=range] { flex: 1; cursor: pointer; accent-color: var(--secondary); height: 4px; }

        /* --- GRID --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;
            width: 100%; max-width: 1100px; padding-bottom: 40px;
        }
        .card { background: var(--glass); border: 1px solid var(--border-glass); padding: 35px; border-radius: 35px; }
        .card h2 { font-size: 1rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; color: var(--secondary); letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .big-text { font-size: 1.6rem; font-weight: 900; display: block; color: var(--text-main); margin: 5px 0; line-height: 1.2; }
        .accent-text { color: var(--accent); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        .soc-row { display: flex; gap: 12px; margin-top: 25px; }
        .soc-item { width: 50px; height: 50px; border-radius: 12px; background: var(--text-main); display: flex; align-items: center; justify-content: center; color: var(--bg-dark); text-decoration: none; font-size: 1.4rem; }
        .soc-item:hover { transform: scale(1.1); background: var(--secondary); }

        /* --- UI PRVKY --- */
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; background: var(--glass); border: 1px solid var(--border-glass); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); }

        footer { padding: 30px; text-align: center; border-top: 1px solid var(--border-glass); margin-top: auto; }
        footer p { font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.3); }

        @media (max-width: 600px) {
            .main-wrapper { padding: 40px 15px; }
            h1 { font-size: 3.5rem; }
            .player-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon" id="themeIcon"></i>
    </div>

    <div class="main-wrapper">
        <header>
            <h1>MOVEIT RÁDIO<span class="live-dot"></span></h1>
            <p class="tagline">Tvoja vlna energie</p>
        </header>

        <section class="player-card" id="playerContainer">
            <div class="now-playing">
                <span id="track-artist">MOVEIT RÁDIO</span>
                <div id="track-title">PRIPRAVENÝ NA POHYB<div class="visualizer-inline"><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div></div></div>
            </div>

            <div class="play-outer">
                <div class="glow-ring"></div>
                <button id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
            </div>

            <div class="vol-wrap">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
        </section>

        <div class="grid">
            <div class="card">
                <h2><i class="fas fa-compact-disc"></i> PROGRAM</h2>
                <p class="accent-text">Každý piatok:</p>
                <span class="big-text">Večerná zábava s DJ Filipom</span>
                <p style="opacity: 0.6; font-size: 0.85rem; margin-top: 5px;">20:00 — 22:00 | LIVE DANCE MIX</p>
            </div>

            <div class="card">
                <h2><i class="fas fa-bolt"></i> EXTRA SHOW</h2>
                <p class="accent-text">Oficiálne vysielanie:</p>
                <span class="big-text">Denná zábava s DJ Filipom</span>
                <p style="opacity: 0.6; font-size: 0.85rem; margin-top: 5px;">Podľa aktuálnej nálady a energie</p>
            </div>

            <div class="card">
                <h2><i class="fas fa-share-nodes"></i> SLEDUJ NÁS</h2>
                <div class="soc-row">
                    <a href="https://www.instagram.com/moveitradio_sk" class="soc-item" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@moveitradio_sk" class="soc-item" target="_blank"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>POWERED BY <a href="https://sites.google.com/view/martin-weby/web" target="_blank" style="color:var(--secondary); text-decoration:none;">MARTIN</a> &copy; 2026</p>
    </footer>

    <audio id="radioAudio" src="https://stream.zeno.fm/jkrusgbmbtcvv" preload="none"></audio>

    <script>
        const audio = document.getElementById('radioAudio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const playerContainer = document.getElementById('playerContainer');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // Dark/Light Mode
        themeToggle.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                themeIcon.className = 'fas fa-moon';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeIcon.className = 'fas fa-sun';
            }
        });

        // Ovládání přehrávače
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.src = "https://stream.zeno.fm/jkrusgbmbtcvv"; // Refresh streamu pro odstranění delaye
                audio.play().catch(error => console.log("Prehrávanie zlyhalo:", error));
                playIcon.className = 'fas fa-pause';
                playerContainer.classList.add('playing');
            } else {
                audio.pause();
                audio.src = ""; // Stop bufferování
                playIcon.className = 'fas fa-play';
                playerContainer.classList.remove('playing');
            }
        });

        // Hlasitost
        document.getElementById('volume').addEventListener('input', (e) => audio.volume = e.target.value);

        // Metadata (Názvy skladeb)
        let currentFullTitle = "";

        function subscribeToMetadata() {
            const eventSource = new EventSource('https://api.zeno.fm/mounts/metadata/subscribe/jkrusgbmbtcvv');
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.streamTitle && data.streamTitle !== currentFullTitle) {
                    currentFullTitle = data.streamTitle;
                    
                    const parts = data.streamTitle.split(' - ');
                    const artist = (parts[0] || "MOVEIT RÁDIO").toUpperCase();
                    const title = (parts[1] || parts[0]).toUpperCase();
                    
                    trackTitle.style.opacity = 0;
                    trackArtist.style.opacity = 0;
                    
                    setTimeout(() => {
                        trackArtist.innerText = artist;
                        trackTitle.innerHTML = title + `<div class="visualizer-inline"><div class="vis-bar"></div><div class="visualizer-inline"><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div></div>`;
                        trackTitle.style.opacity = 1;
                        trackArtist.style.opacity = 1;
                    }, 300);
                }
            };
            eventSource.onerror = () => {
                console.log("Metadata reconnecting...");
                eventSource.close();
                setTimeout(subscribeToMetadata, 5000);
            };
        }
        subscribeToMetadata();
    </script>
</body>
</html>
